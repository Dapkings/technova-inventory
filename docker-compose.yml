version: '3.8'

services:
  # 1. Aplikasi FastAPI TechNova
  app:
    build: .
    container_name: technova-app
    ports:
      - "8000:8000"
    restart: always

  # 2. Prometheus (Metrics Collector)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  # 3. Grafana (Dashboard Visualisasi)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: always